<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Quipped</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 380px;
      height: 580px;
      background: #0a0a0c;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: 100%;
      height: 100%;
      background: #17171a;
      border-radius: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.6),
        0 2px 8px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      color: #f0f0f0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: block;
      background-color: rgba(255, 255, 255, 0.7);
      -webkit-mask-image: url('icons/logo.svg');
      mask-image: url('icons/logo.svg');
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
    }

    .wordmark {
      font-size: 12.5px;
      font-weight: 650;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: -0.2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(180deg, #fcfcfc 0%, #e4e4e4 100%);
      border: 0.5px solid rgba(0, 0, 0, 0.12);
      color: rgba(0, 0, 0, 0.8);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.05px;
      cursor: pointer;
      outline: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.05),
        0 1px 0 rgba(255, 255, 255, 0.4),
        0 3px 0 rgba(150, 150, 150, 0.55),
        0 3px 1px rgba(150, 150, 150, 0.55),
        0 6px 12px rgba(0, 0, 0, 0.38);
      transform: translateY(0);
      transition:
        opacity 0.16s cubic-bezier(0.2, 0.9, 0.3, 1),
        transform 0.08s cubic-bezier(0.2, 0.9, 0.3, 1),
        box-shadow 0.08s,
        background 0.12s;
    }

    .action-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eaeaea 100%);
    }

    .action-btn:active {
      transform: translateY(3px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.05),
        0 0 0 rgba(255, 255, 255, 0.4),
        0 0 0 rgba(150, 150, 150, 0.55),
        0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .action-btn.saved {
      background: linear-gradient(180deg, #ecfdf3 0%, #c9f5da 100%);
      color: #15803d;
      border-color: rgba(21, 128, 61, 0.3);
      animation: saveFlash 1.1s ease forwards;
    }

    @keyframes saveFlash {
      0% {
        transform: scale(1.05) translateY(0);
      }

      30% {
        transform: scale(1) translateY(0);
      }

      100% {
        transform: scale(1) translateY(0);
      }
    }

    #savebtn {
      border-radius: 10px;
      padding: 6px 14px;
      opacity: 0;
      transform: translateY(0) scale(0.92);
      pointer-events: none;
    }

    #savebtn.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .gear-btn {
      background: none;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .gear-btn:hover {
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }

    .list-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .list-wrap::-webkit-scrollbar {
      display: none;
    }

    .quip-row {
      display: flex;
      flex-direction: column;
      padding: 12px 11px 12px 13px;
      gap: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.045);
    }

    .qr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .quip-row:first-child {
      border-top: 1px solid rgba(255, 255, 255, 0.045);
    }

    .code-chip {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.055);
      border: 0.5px solid transparent;
      border-radius: 4px;
      padding: 3px 7px;
      min-width: 32px;
      text-align: center;
      cursor: text;
      outline: none;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .code-chip:focus {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.09);
      color: rgba(255, 255, 255, 0.85);
    }

    .exp-input {
      width: 100%;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12.5px;
      font-family: inherit;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      padding: 0;
      text-align: left;
    }

    .exp-input:empty:before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .exp-input b,
    .exp-input strong {
      font-weight: 700;
    }

    .del-btn {
      background: none;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .del-btn:hover {
      color: #f87171;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.1);
      font-size: 12px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      flex-shrink: 0;
    }

    .tkey {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.07);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.32);
      line-height: 1.4;
      font-family: -apple-system, system-ui, sans-serif;
    }

    #newpill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: linear-gradient(180deg, #fcfcfc 0%, #e4e4e4 100%);
      border: 0.5px solid rgba(0, 0, 0, 0.12);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.05),
        0 1px 0 rgba(255, 255, 255, 0.4),
        0 3px 0 rgba(150, 150, 150, 0.55),
        0 3px 1px rgba(150, 150, 150, 0.55),
        0 6px 12px rgba(0, 0, 0, 0.38);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      outline: none;
      transform: translateY(0);
      transition:
        opacity 0.18s cubic-bezier(0.2, 0.9, 0.3, 1),
        transform 0.08s cubic-bezier(0.2, 0.9, 0.3, 1),
        box-shadow 0.08s,
        background 0.12s;
    }

    #newpill:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eaeaea 100%);
    }

    #newpill:active {
      transform: translateY(3px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.05),
        0 0 0 rgba(255, 255, 255, 0.4),
        0 0 0 rgba(150, 150, 150, 0.55),
        0 2px 6px rgba(0, 0, 0, 0.3);
    }

    #newpill.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .npill-icon {
      color: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
    }

    .npill-text {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.75);
      letter-spacing: -0.1px;
    }

    #newform {
      position: absolute;
      bottom: 11px;
      left: 50%;
      transform: translateX(-50%) scale(0.94);
      transform-origin: bottom center;
      width: calc(100% - 28px);
      background: #ffffff;
      border: 0.5px solid rgba(0, 0, 0, 0.1);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.06),
        0 -2px 32px rgba(0, 0, 0, 0.12),
        0 8px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.18s cubic-bezier(0.2, 0.9, 0.3, 1);
      z-index: 20;
    }

    #newform.open {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) scale(1);
    }

    .nf-input {
      background: rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 8px;
      color: rgba(0, 0, 0, 0.82);
      font-size: 12.5px;
      font-family: inherit;
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.12s, background 0.12s;
    }

    .nf-input:focus {
      border-color: rgba(0, 0, 0, 0.18);
      background: rgba(0, 0, 0, 0.06);
    }

    .nf-input::placeholder {
      color: rgba(0, 0, 0, 0.22);
    }

    #nf-code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    #nf-exp {
      min-height: 56px;
      max-height: 140px;
      overflow-y: auto;
      padding: 9px 11px;
    }

    #nf-exp:empty:before {
      color: rgba(0, 0, 0, 0.22);
    }

    .nf-row {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .nf-format {
      display: flex;
      gap: 4px;
    }

    .nf-fbtn {
      width: 24px;
      height: 24px;
      background: rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 6px;
      color: rgba(0, 0, 0, 0.45);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .nf-fbtn:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .nf-fbtn.active {
      background: rgba(0, 0, 0, 0.14);
      border-color: rgba(0, 0, 0, 0.2);
      color: rgba(0, 0, 0, 0.85);
    }

    .nf-actions {
      display: flex;
      gap: 5px;
    }

    .nf-cancel {
      background: rgba(0, 0, 0, 0.05);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 7px;
      color: rgba(0, 0, 0, 0.4);
      font-size: 11.5px;
      font-weight: 600;
      font-family: inherit;
      padding: 6px 12px;
      cursor: pointer;
      outline: none;
      transition: background 0.1s;
    }

    .nf-cancel:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .nf-add {
      background: rgba(0, 0, 0, 0.82);
      border: 0.5px solid rgba(0, 0, 0, 0.9);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 11.5px;
      font-weight: 650;
      font-family: inherit;
      padding: 6px 14px;
      cursor: pointer;
      outline: none;
      transition: background 0.1s;
    }

    .nf-add:hover {
      background: rgba(0, 0, 0, 0.92);
    }

    .nf-add:active {
      opacity: 0.7;
    }

    #settingspop,
    #infopop {
      position: absolute;
      top: 42px;
      background: #1c1c20;
      border: 0.5px solid rgba(255, 255, 255, 0.09);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.5),
        0 10px 34px rgba(0, 0, 0, 0.55),
        0 2px 8px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95) translateY(-4px);
      transform-origin: top right;
      transition: opacity 0.16s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.16s cubic-bezier(0.2, 0.9, 0.3, 1);
      z-index: 50;
    }

    #settingspop,
    #infopop {
      padding: 13px 12px 12px;
      gap: 8px;
    }

    #settingspop {
      right: 44px;
      width: 208px;
    }

    #infopop {
      right: 12px;
      width: 208px;
    }

    #settingspop.open,
    #infopop.open {
      opacity: 1;
      pointer-events: all;
      transform: scale(1) translateY(0);
    }

    .sp-title {
      font-size: 11.5px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.82);
      letter-spacing: -0.1px;
    }

    .sp-desc {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.42);
      line-height: 1.5;
    }

    .sp-cycle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 10px;
      background: rgba(255, 255, 255, 0.045);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      cursor: pointer;
      user-select: none;
      outline: none;
      transition: background 0.12s, border-color 0.12s;
    }

    .sp-cycle:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .sp-cycle:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .sp-cycle-static {
      cursor: default;
    }

    .sp-cycle-static:hover {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .sp-cycle-label {
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      margin-left: 2px;
    }

    .sp-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.26);
    }

    .ip-link {
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      transition: color 0.12s;
    }

    .ip-link:hover {
      color: #ffffff;
    }

    #backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      border-radius: 16px;
    }

    #backdrop.on {
      display: block;
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="backdrop"></div>

    <div class="header">
      <div class="brand">
        <div class="logo" role="img" aria-label="Quipped logo"></div>
        <span class="wordmark">Your Quips</span>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="savebtn">Save</button>
        <button class="gear-btn" id="gearbtn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h7M12 4h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <circle cx="9.5" cy="4" r="1.7" fill="currentColor" />
            <path d="M2 8h2M7 8h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <circle cx="4.5" cy="8" r="1.7" fill="currentColor" />
            <path d="M2 12h5.5M11 12h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <circle cx="9" cy="12" r="1.7" fill="currentColor" />
          </svg>
        </button>
        <button class="gear-btn" id="infobtn" title="About Quipped">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6.4" stroke="currentColor" stroke-width="1.6" />
            <rect x="7.15" y="6.7" width="1.7" height="4.7" rx="0.85" fill="currentColor" />
            <rect x="7.15" y="3.9" width="1.7" height="1.7" rx="0.85" fill="currentColor" />
          </svg>
        </button>
      </div>
    </div>

    <div id="settingspop">
      <div class="sp-title">Expand shortcut</div>
      <div class="sp-desc">Hold this key with ↩ to expand a saved quip while typing.</div>
      <div class="sp-cycle" id="spmodcycle" role="button" tabindex="0">
        <span class="tkey" id="sppreviewmod">⌥</span>
        <span class="tkey">↩</span>
        <span class="sp-cycle-label" id="spmodname">Option</span>
      </div>
      <div class="sp-hint">Tap to cycle · Alt, Ctrl, Shift</div>
    </div>

    <div id="infopop">
      <div class="sp-title">About Quipped</div>
      <div class="sp-desc">Made with love by Aryan Madan because who types the same things twice?</div>
      <div class="sp-cycle sp-cycle-static">
        <span class="tkey">❤️</span>
        <a class="ip-link" href="https://aryanmadan.xyz" target="_blank" rel="noopener noreferrer">aryanmadan.xyz</a>
      </div>
    </div>

    <div class="list-wrap">
      <div id="list"></div>
    </div>

    <div class="footer">
      <div id="newpill">
        <span class="npill-icon" style="padding:0 3px 0 0">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          </svg>
        </span>
        <span class="npill-text">New quip</span>
      </div>
    </div>

    <div id="newform">
      <input class="nf-input" id="nf-code" placeholder="!shortcode" autocomplete="off" spellcheck="false" />
      <div class="nf-input exp-input" id="nf-exp" contenteditable="true" data-placeholder="Expansion text"></div>
      <div class="nf-row">
        <div class="nf-format">
          <button class="nf-fbtn" id="nf-bold" type="button"><b>B</b></button>
          <button class="nf-fbtn" id="nf-italic" type="button"><i>I</i></button>
          <button class="nf-fbtn" id="nf-underline" type="button"><u>U</u></button>
        </div>
        <div class="nf-actions">
          <button class="nf-cancel" id="nf-cancel">Cancel</button>
          <button class="nf-add" id="nf-add">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
