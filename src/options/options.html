<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Quipped</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 380px;
      height: 580px;
      background: #0a0a0c;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: 100%;
      height: 100%;
      background: #17171a;
      border-radius: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.6),
        0 2px 8px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      color: #f0f0f0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: block;
      background-color: rgba(255, 255, 255, 0.7);
      -webkit-mask-image: url('icons/logo.svg');
      mask-image: url('icons/logo.svg');
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
    }

    .wordmark {
      font-size: 12.5px;
      font-weight: 650;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: -0.2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .save-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 20px;
      padding: 4px 11px;
      cursor: pointer;
      transition: opacity 0.15s;
      opacity: 0;
      pointer-events: none;
      outline: none;
    }

    .save-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    .save-btn:active {
      opacity: 0.5;
    }

    .gear-btn {
      background: none;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .gear-btn:hover {
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }

    .list-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .list-wrap::-webkit-scrollbar {
      display: none;
    }

    .quip-row {
      display: flex;
      flex-direction: column;
      padding: 12px 11px 12px 13px;
      gap: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.045);
    }

    .qr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .quip-row:first-child {
      border-top: 1px solid rgba(255, 255, 255, 0.045);
    }

    .code-chip {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.055);
      border: 0.5px solid transparent;
      border-radius: 4px;
      padding: 3px 7px;
      min-width: 32px;
      text-align: center;
      cursor: text;
      outline: none;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .code-chip:focus {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.09);
      color: rgba(255, 255, 255, 0.85);
    }

    .exp-input {
      width: 100%;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12.5px;
      font-family: inherit;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      padding: 0;
      text-align: left;
    }

    .exp-input:empty:before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .exp-input b,
    .exp-input strong {
      font-weight: 700;
    }

    .del-btn {
      background: none;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .del-btn:hover {
      color: #f87171;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.1);
      font-size: 12px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      flex-shrink: 0;
    }

    .tkey {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.07);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.32);
      line-height: 1.4;
      font-family: -apple-system, system-ui, sans-serif;
    }

    #newpill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      background: #ffffff;
      border: 0.5px solid rgba(255, 255, 255, 0.9);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.08),
        0 4px 16px rgba(0, 0, 0, 0.35),
        0 1px 4px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.06);
      border-radius: 14px;
      cursor: pointer;
      user-select: none;
      outline: none;
      transition: box-shadow 0.14s, opacity 0.18s, background 0.14s;
    }

    #newpill:hover {
      background: #f5f5f5;
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.1),
        0 6px 20px rgba(0, 0, 0, 0.4),
        0 1px 4px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    }

    #newpill:active {
      opacity: 0.8;
    }

    #newpill.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .npill-icon {
      color: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
    }

    .npill-text {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.75);
      letter-spacing: -0.1px;
    }

    #newform {
      position: absolute;
      bottom: 11px;
      left: 50%;
      transform: translateX(-50%) scale(0.94);
      transform-origin: bottom center;
      width: calc(100% - 28px);
      background: #ffffff;
      border: 0.5px solid rgba(0, 0, 0, 0.1);
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.06),
        0 -2px 32px rgba(0, 0, 0, 0.12),
        0 8px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.18s cubic-bezier(0.2, 0.9, 0.3, 1);
      z-index: 20;
    }

    #newform.open {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) scale(1);
    }

    .nf-input {
      background: rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 8px;
      color: rgba(0, 0, 0, 0.82);
      font-size: 12.5px;
      font-family: inherit;
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.12s, background 0.12s;
    }

    .nf-input:focus {
      border-color: rgba(0, 0, 0, 0.18);
      background: rgba(0, 0, 0, 0.06);
    }

    .nf-input::placeholder {
      color: rgba(0, 0, 0, 0.22);
    }

    #nf-code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    #nf-exp {
      min-height: 56px;
      max-height: 140px;
      overflow-y: auto;
      padding: 9px 11px;
    }

    #nf-exp:empty:before {
      color: rgba(0, 0, 0, 0.22);
    }

    .nf-row {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .nf-format {
      display: flex;
      gap: 4px;
    }

    .nf-fbtn {
      width: 24px;
      height: 24px;
      background: rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 6px;
      color: rgba(0, 0, 0, 0.45);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .nf-fbtn:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .nf-fbtn.active {
      background: rgba(0, 0, 0, 0.14);
      border-color: rgba(0, 0, 0, 0.2);
      color: rgba(0, 0, 0, 0.85);
    }

    .nf-actions {
      display: flex;
      gap: 5px;
    }

    .nf-cancel {
      background: rgba(0, 0, 0, 0.05);
      border: 0.5px solid rgba(0, 0, 0, 0.09);
      border-radius: 7px;
      color: rgba(0, 0, 0, 0.4);
      font-size: 11.5px;
      font-weight: 600;
      font-family: inherit;
      padding: 6px 12px;
      cursor: pointer;
      outline: none;
      transition: background 0.1s;
    }

    .nf-cancel:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .nf-add {
      background: rgba(0, 0, 0, 0.82);
      border: 0.5px solid rgba(0, 0, 0, 0.9);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 11.5px;
      font-weight: 650;
      font-family: inherit;
      padding: 6px 14px;
      cursor: pointer;
      outline: none;
      transition: background 0.1s;
    }

    .nf-add:hover {
      background: rgba(0, 0, 0, 0.92);
    }

    .nf-add:active {
      opacity: 0.7;
    }

    #settingspop {
      position: absolute;
      top: 42px;
      right: 12px;
      width: 230px;
      background: rgba(32, 32, 36, 0.99);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.06),
        0 8px 32px rgba(0, 0, 0, 0.55),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.07),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      border-radius: 14px;
      padding: 14px 13px 12px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95) translateY(-4px);
      transform-origin: top right;
      transition: opacity 0.16s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.16s cubic-bezier(0.2, 0.9, 0.3, 1);
      z-index: 50;
    }

    #settingspop.open {
      opacity: 1;
      pointer-events: all;
      transform: scale(1) translateY(0);
    }

    .sp-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .sp-desc {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 1px;
    }

    .sp-mods {
      display: flex;
      gap: 4px;
    }

    .sp-mod {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 0.5px solid rgba(255, 255, 255, 0.09);
      border-radius: 7px;
      padding: 6px 4px;
      font-size: 11.5px;
      font-family: inherit;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      text-align: center;
      outline: none;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .sp-mod.active {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.88);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 1px 0 rgba(0, 0, 0, 0.4);
    }

    .sp-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
    }

    .sp-preview-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.22);
    }

    .sp-preview-keys {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .sp-divider {
      height: 0.5px;
      background: rgba(255, 255, 255, 0.07);
      margin: 0 -13px;
    }

    .sp-save {
      background: rgba(255, 255, 255, 0.08);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      padding: 8px;
      cursor: pointer;
      outline: none;
      transition: background 0.12s, color 0.12s;
    }

    .sp-save:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .sp-save.saved {
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.2);
      background: rgba(74, 222, 128, 0.05);
    }

    #backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      border-radius: 16px;
    }

    #backdrop.on {
      display: block;
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="backdrop"></div>

    <div class="header">
      <div class="brand">
        <div class="logo" role="img" aria-label="Quipped logo"></div>
        <span class="wordmark">Your Quips</span>
      </div>
      <div class="header-actions">
        <button class="save-btn" id="savebtn">Save</button>
        <button class="gear-btn" id="gearbtn">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor" />
            <rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor" />
            <rect x="1" y="11" width="14" height="2" rx="1" fill="currentColor" />
            <rect x="5" y="2" width="2" height="4" rx="1" fill="currentColor" />
            <rect x="9" y="6" width="2" height="4" rx="1" fill="currentColor" />
            <rect x="5" y="10" width="2" height="4" rx="1" fill="currentColor" />
          </svg>
        </button>
      </div>
    </div>

    <div id="settingspop">
      <div>
        <div class="sp-desc">Modifier + ↩ to expand a match</div>
      </div>
      <div class="sp-mods" id="spmodselect">
        <button class="sp-mod" data-mod="alt">⌥ Alt</button>
        <button class="sp-mod" data-mod="ctrl">⌃ Ctrl</button>
        <button class="sp-mod" data-mod="shift">⇧ Shift</button>
      </div>
      <div class="sp-preview">
        <span class="sp-preview-label">Shortcut</span>
        <span class="sp-preview-keys">
          <span class="tkey" id="sppreviewmod">⌥</span>
          <span class="tkey">↩</span>
        </span>
      </div>
      <div class="sp-divider"></div>
      <button class="sp-save" id="spsave">Save settings</button>
    </div>

    <div class="list-wrap">
      <div id="list"></div>
    </div>

    <div class="footer">
      <div id="newpill">
        <span class="npill-icon" style="padding:0 3px 0 0">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          </svg>
        </span>
        <span class="npill-text">New quip</span>
      </div>
    </div>

    <div id="newform">
      <input class="nf-input" id="nf-code" placeholder="!shortcode" autocomplete="off" spellcheck="false" />
      <div class="nf-input exp-input" id="nf-exp" contenteditable="true" data-placeholder="Expansion text"></div>
      <div class="nf-row">
        <div class="nf-format">
          <button class="nf-fbtn" id="nf-bold" type="button"><b>B</b></button>
          <button class="nf-fbtn" id="nf-italic" type="button"><i>I</i></button>
          <button class="nf-fbtn" id="nf-underline" type="button"><u>U</u></button>
        </div>
        <div class="nf-actions">
          <button class="nf-cancel" id="nf-cancel">Cancel</button>
          <button class="nf-add" id="nf-add">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
